<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoGPU v7 Hardware Monitor</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', monospace; 
        }
        #monitor { 
            background: #000; 
            padding: 20px; 
            border: 6px solid #222; 
            border-radius: 8px;
            white-space: pre; 
            line-height: 1.1; 
            font-size: 18px; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }
        .info {
            margin-top: 20px;
            color: #555;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <pre id="monitor">WAITING FOR BUS DATA...</pre>
    <div class="info">CORE: NanoGPU_v7 | INTERFACE: TRAM_READY</div>

    <!-- Ensure nanogpu.js is in the same folder -->
    <script src="nanogpu.js"></script>
    <script>
        // 1. Install Hardware
        const gpu = new window.NanoGPU_v8('monitor', 60, 20);
        
        // 2. Define Texture Data (8x8 grid of ASCII characters)
        // This is a simple 'Face' sprite stored as an array of ASCII numbers
        const faceTex = [
            32, 32, 32, 32, 32, 32, 32, 32,
            32, 32, 35, 32, 32, 35, 32, 32,
            32, 32, 35, 32, 32, 35, 32, 32,
            32, 32, 32, 32, 32, 32, 32, 32,
            32, 35, 32, 32, 32, 32, 35, 32,
            32, 32, 35, 35, 35, 35, 32, 32,
            32, 32, 32, 32, 32, 32, 32, 32,
            32, 32, 32, 32, 32, 32, 32, 32
        ];

        let angle = 0;
        let slider = 0;

        function cpuClock() {
            // CPU-side logic
            angle = (angle + 3) % 360;
            slider = (slider + 0.2) % 40;

            // 3. Command Stream for v7 Pipeline:
            // 0x20: HW_CLEAR
            // 0xB0: LOAD_TEXTURE (Followed by 64 bytes of faceTex)
            // 0xA6: SET_SAMPLER_MODE (1 = Textured)
            // 0xA1: SET_ROTATION
            // 0xA3: SET_OFFSET_X
            // 0x40: DRAW_TEXTURED_RECT [X, Y, W, H, Depth]
            // 0x30: SWAP_BUFFERS
            const commandStream = [
                0x20,                                   // Reset VRAM/Z-Buffer
                0xB0, ...faceTex,                       // Upload texture to TRAM
                0xA6, 1,                                // Enable texture sampler
                0xA1, Math.floor(angle),               // Set Rotation register
                0xA3, Math.floor(slider),              // Set X-Offset register
                0x40, 20, 5, 12, 10, 50,                // Draw the textured sprite
                0x30                                    // V-Sync Swap
            ];

            // 4. Send to GPU Bus
            gpu.sendData(commandStream);
            
            // 5. GPU Execution
            gpu.cycle();
            gpu.render();

            requestAnimationFrame(cpuClock);
        }

        // Start the system
        cpuClock();
    </script>
</body>
</html>
